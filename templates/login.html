<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Slot</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #ffd700; font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 40px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            outline: 2px solid transparent;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        input:focus { outline: 2px solid #ffd700; background: rgba(255,255,255,0.15); }
        button {
            background: #ffd700;
            border: none;
            padding: 15px 40px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            color: #1a1a2e;
            width: 100%;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(255,215,0,0.3); }
        .error { color: #ff6b6b; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🎰 SLOT</h1>
        <p>Kullanıcı adınla giriş yap veya yeni hesap oluştur</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Kullanıcı Adı" required>
            <button type="submit">🚀 Başla</button>
        </form>
    </div>
</body>
</html>
